<app-nav></app-nav>

<div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
  <div class="row w-100 justify-content-center">
    <div class="col-lg-4 col-md-6 col-sm-10">

      <!-- Error Alert -->
      <div *ngIf="errorMessage" class="alert alert-danger text-center mb-3">
        {{ errorMessage }}
      </div>

      <!-- Card -->
      <div class="card border-0">
        <div class="card-body">

          <!-- Header -->
          <div class="text-center mb-4">
            <div class="auth-logo">&lt;/&gt;</div>
            <h3 class="fw-bold">Welcome back</h3>
            <p class="text-muted mb-0">Sign in to your CodeMarket account</p>
          </div>

          <!-- Form -->
          <form (ngSubmit)="onSubmit()" [formGroup]="loginForm">

            <!-- Username -->
            <div class="mb-3">
              <label class="form-label fw-semibold" for="username">Username</label>
              <input
                [class.is-invalid]="loginForm.get('username')?.touched && loginForm.get('username')?.invalid"
                class="form-control form-control-lg"
                formControlName="username"
                id="username"
                placeholder="Enter your username"
                type="text"
              />
              <div
                *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid"
                class="field-error">
                Username is required
              </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
              <div class="d-flex justify-content-between align-items-center mb-1">
                <label class="form-label fw-semibold mb-0" for="password">Password</label>
                <a class="forgot-link" href="#">Forgot password?</a>
              </div>

              <div class="password-wrap">
                <input
                  [class.is-invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
                  [type]="hidePassword ? 'password' : 'text'"
                  class="form-control form-control-lg"
                  formControlName="password"
                  id="password"
                  placeholder="••••••••"
                />
                <button
                  (click)="togglePasswordVisibility()"
                  class="toggle-pw"
                  type="button">
                  {{ hidePassword ? 'Show' : 'Hide' }}
                </button>
              </div>

              <div
                *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
                class="field-error">
                Password must be at least 6 characters
              </div>
            </div>

            <!-- Submit -->
            <button
              [disabled]="loading || loginForm.invalid"
              class="btn btn-success btn-lg w-100 mt-2"
              type="submit">
              <span *ngIf="!loading">Sign In</span>
              <span *ngIf="loading" class="d-flex align-items-center justify-content-center gap-2">
                <span class="spinner-border spinner-border-sm"></span>
                Signing in...
              </span>
            </button>

          </form>

          <!-- Footer -->
          <hr class="auth-divider"/>
          <div class="text-center">
            <small class="text-muted">
              Don't have an account?
              <a class="fw-semibold text-decoration-none" routerLink="/auth/signup">Create one</a>
            </small>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
