<app-nav></app-nav>

<div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
  <div class="row w-100 justify-content-center">
    <div class="col-lg-4 col-md-6 col-sm-10">

      <!-- Error Alert -->
      <div *ngIf="error" class="alert alert-danger text-center mb-3">
        {{ error }}
      </div>

      <!-- Card -->
      <div class="card border-0">
        <div class="card-body">

          <!-- Header -->
          <div class="text-center mb-4">
            <div class="auth-logo">&lt;/&gt;</div>
            <h3 class="fw-bold">Create Account</h3>
            <p class="text-muted mb-0">Join us and start your journey</p>
          </div>

          <!-- Form -->
          <form (ngSubmit)="onSubmit()">

            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <input
                [(ngModel)]="form.username"
                class="form-control form-control-lg"
                name="username"
                placeholder="Enter your username"
                required
                type="text"
              />
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Email address</label>
              <input
                [(ngModel)]="form.email"
                class="form-control form-control-lg"
                name="email"
                placeholder="example@email.com"
                required
                type="email"
              />
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input
                [(ngModel)]="form.password"
                class="form-control form-control-lg"
                name="password"
                placeholder="••••••••"
                required
                type="password"
              />
            </div>

            <button
              [disabled]="loading"
              class="btn btn-success btn-lg w-100 mt-2"
              type="submit"
            >
              <span *ngIf="!loading">Create Account</span>
              <span *ngIf="loading">Creating account...</span>
            </button>

          </form>

          <!-- Footer -->
          <hr class="auth-divider"/>
          <div class="text-center">
            <small class="text-muted">
              Already have an account?
              <a class="fw-semibold text-decoration-none" routerLink="/auth/signin">Sign in</a>
            </small>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
