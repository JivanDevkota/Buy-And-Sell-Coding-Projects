<div class="wishlist-container">

  <!-- Header -->
  <div class="wishlist-header">
    <h2>
      <span class="header-heart">&#9829;</span> My Wishlist
    </h2>
    <p>You have <strong>{{ wishlist.length }} projects</strong> saved for later</p>
  </div>

  <!-- Main Panel -->
  <div class="wishlist-panel">

    <!-- Controls -->
    <div class="wishlist-controls">
      <h3 class="section-title">
        <span class="section-heart">&#9829;</span> Saved Projects
      </h3>
      <div class="controls-right">
        <input
          type="text"
          placeholder="Search wishlist..."
          [(ngModel)]="searchText"
          class="search-input"
        />
        <select class="sort-select">09
          <option>Sort by: Recently Added</option>
          <option>Sort by: Price Low–High</option>
          <option>Sort by: Top Rated</option>
        </select>
      </div>
    </div>

    <!-- Cards Grid -->
    <div class="wishlist-grid">
      <div class="wl-card" *ngFor="let item of wishlist; let i = index">

        <!-- Thumbnail Banner -->
        <div class="card-banner" [ngClass]="getBannerClass(i)">
          <img *ngIf="item.projectImg";p [src]="item.projectImg" [alt]="item.projectName" class="banner-img" />
          <ng-container *ngIf="!item.projectImg">
            <svg *ngIf="i % 3 === 0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" class="banner-svg">
              <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
            </svg>
            <svg *ngIf="i % 3 === 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" class="banner-svg">
              <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
            </svg>
            <svg *ngIf="i % 3 === 2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" class="banner-svg">
              <path d="M7 13c1.66 0 3-1.34 3-3S8.66 7 7 7s-3 1.34-3 3 1.34 3 3 3zm12-6h-8v7H3V5H1v15h2v-3h18v3h2v-9c0-2.21-1.79-4-4-4z"/>
            </svg>
          </ng-container>
        </div>

        <!-- Card Body -->
        <div class="card-body">
          <h3 class="card-title">{{ item.projectName }}</h3>
          <p class="card-desc">{{ item.projectDescription }}</p>

          <!-- Tech Tags -->
          <div class="card-tags">
            <span class="tag" *ngFor="let lang of item.languageName">{{ lang }}</span>
          </div>

          <!-- Rating — demo text until API ready -->
          <div class="card-rating">
            <span class="star">&#9733;</span>
            <span class="rating-value">4.7</span>
            <span class="review-count">(120 reviews)</span>
          </div>

          <!-- Footer: price + buttons -->
          <div class="card-footer">
            <div class="card-price">${{ item.price }}</div>
            <div class="card-actions">
              <button class="btn-wish" title="Saved to wishlist" (click)="deleteMyWishlist(item.projectId)">
                <span class="btn-heart">&#9829;</span>
              </button>
              <button class="btn-add">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" class="cart-icon">
                  <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.17 14.75L5.12 4H3V2H6l.85 4H20l-2.5 8H7.17z"/>
                </svg>
                Add
              </button>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
