<app-seller-head></app-seller-head>

<div class="container my-4">
  <div class="row justify-content-center">
    <div class="col-xl-6 col-lg-7 col-md-9">

      <div class="card shadow-sm">
        <div class="card-header py-2 bg-primary text-white">
          <h6 class="mb-0">Upload New Project</h6>
        </div>

        <div class="card-body p-3">

          <!-- Success -->
          <div *ngIf="successMessage" class="alert alert-success py-2">
            {{ successMessage }}
          </div>

          <!-- Error -->
          <div *ngIf="errorMessage" class="alert alert-danger py-2">
            {{ errorMessage }}
          </div>

          <form (ngSubmit)="submitProject()">

            <!-- Title -->
            <div class="mb-2">
              <label class="form-label small">Title *</label>
              <input [(ngModel)]="projectForm.title" class="form-control form-control-sm"
                     name="title" required type="text">
            </div>

            <!-- Description -->
            <div class="mb-2">
              <label class="form-label small">Description *</label>
              <textarea [(ngModel)]="projectForm.description"
                        class="form-control form-control-sm"
                        name="description"
                        required
                        rows="3"></textarea>
            </div>

            <!-- Price & Category -->
            <div class="row">
              <div class="col-6 mb-2">
                <label class="form-label small">Price ($) *</label>
                <input [(ngModel)]="projectForm.price" class="form-control form-control-sm"
                       name="price"
                       required type="number">
              </div>

              <div class="col-6 mb-2">
                <label class="form-label small">Category *</label>
                <select [(ngModel)]="projectForm.categoryId"
                        class="form-select form-select-sm"
                        name="category" required>
                  <option [value]="0" disabled>Select</option>
                  <option *ngFor="let c of categories" [value]="c.id">
                    {{ c.name }}
                  </option>
                </select>
              </div>
            </div>

            <!-- Languages -->
            <div class="mb-2">
              <label class="form-label small">Languages *</label>
              <div class="row g-1">
                <div *ngFor="let language of languages" class="col-6">
                  <div class="form-check small">
                    <input (change)="toggleLanguage(language.id)"
                           [checked]="isLanguageSelected(language.id)"
                           class="form-check-input"
                           type="checkbox">
                    <label class="form-check-label">
                      {{ language.name }}
                    </label>
                  </div>
                </div>
              </div>
            </div>

            <!-- Tags -->
            <div class="mb-2">
              <label class="form-label small">Tags *</label>
              <div class="input-group input-group-sm mb-1">
                <input (keyup.enter)="addTag()"
                       [(ngModel)]="tagInput"
                       class="form-control"
                       name="tagInput">
                <button (click)="addTag()"
                        class="btn btn-outline-secondary"
                        type="button">Add
                </button>
              </div>

              <div class="d-flex flex-wrap gap-1">
                <span *ngFor="let tag of projectForm.tags; let i = index"
                      class="badge bg-secondary">
                  {{ tag }}
                  <button (click)="removeTag(i)"
                          class="btn-close btn-close-white ms-1"
                          style="font-size: .6rem"
                          type="button"></button>
                </span>
              </div>
            </div>

            <!-- Project Image -->
            <div class="mb-3">
              <label class="form-label" for="fileInput">Project Image <span class="text-danger">*</span></label>
              <input
                (change)="onFileSelected($event)"
                accept="image/jpeg,image/png,image/gif,image/webp"
                class="form-control"
                id="fileInput"
                required
                type="file">
              <small class="form-text text-muted">
                Allowed formats: JPEG, PNG, GIF, WEBP (Max: 10MB)
              </small>
              <div *ngIf="selectedFileName" class="mt-2">
                <strong>Selected file:</strong> {{ selectedFileName }}
              </div>
            </div>

            <!-- Buttons -->
            <div class="d-flex justify-content-end gap-2">
              <button (click)="resetForm()"
                      class="btn btn-sm btn-outline-secondary"
                      type="button">
                Reset
              </button>

              <button [disabled]="isLoading"
                      class="btn btn-sm btn-primary"
                      type="submit">
                <span *ngIf="isLoading"
                      class="spinner-border spinner-border-sm me-1"></span>
                Upload
              </button>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>
