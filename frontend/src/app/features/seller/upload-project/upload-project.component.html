<div class="upload-page">

  <!-- Page Header Card — matches Manage Sales style -->
  <div class="page-header-card">
    <div class="header-left">
      <div class="header-icon">
        <i class="bi bi-cloud-upload-fill"></i>
      </div>
      <div>
        <h2 class="header-title">Upload New Project</h2>
        <p class="header-sub">Fill in the details to list your project on the marketplace</p>
      </div>
    </div>
  </div>

  <!-- Alerts (outside panels, full width) -->
  <div *ngIf="successMessage" class="alert-success-box" style="margin-bottom:16px">
    <i class="bi bi-check-circle-fill"></i> {{ successMessage }}
  </div>
  <div *ngIf="errorMessage" class="alert-error-box" style="margin-bottom:16px">
    <i class="bi bi-exclamation-circle-fill"></i> {{ errorMessage }}
  </div>

  <form (ngSubmit)="submitProject()">
    <!-- 2-column grid: left = basic info, right = languages/tags/image -->
    <div class="form-grid">

      <!-- ── LEFT PANEL: Basic Info ── -->
      <div class="form-panel">
        <div class="panel-head">
          <h3 class="panel-title"><i class="bi bi-info-circle-fill"></i> Project Info</h3>
        </div>
        <div class="panel-body">

          <div class="form-field">
            <label class="form-label">Title <span class="required">*</span></label>
            <input [(ngModel)]="projectForm.title" class="form-input"
                   name="title" placeholder="e.g. Flight Booking System" required type="text" />
          </div>

          <div class="form-field">
            <label class="form-label">Description <span class="required">*</span></label>
            <textarea [(ngModel)]="projectForm.description" class="form-textarea"
                      name="description" placeholder="Describe what's included, tech stack, features..."
                      required rows="4"></textarea>
          </div>

          <div class="two-col">
            <div class="form-field">
              <label class="form-label">Price ($) <span class="required">*</span></label>
              <input [(ngModel)]="projectForm.price" class="form-input"
                     name="price" placeholder="e.g. 79" required type="number" min="1" />
            </div>
            <div class="form-field">
              <label class="form-label">Category <span class="required">*</span></label>
              <select [(ngModel)]="projectForm.categoryId" class="form-select"
                      name="category" required>
                <option [value]="0" disabled>Select category...</option>
                <option *ngFor="let c of categories" [value]="c.id">{{ c.name }}</option>
              </select>
            </div>
          </div>

          <!-- Image upload in left panel -->
          <div class="form-field">
            <label class="form-label">Project Image <span class="required">*</span></label>
            <div class="file-upload-area" [class.has-file]="selectedFileName">
              <input (change)="onFileSelected($event)"
                     accept="image/jpeg,image/png,image/gif,image/webp"
                     id="fileInput" required type="file" />
              <div class="upload-icon"><i class="bi bi-image"></i></div>
              <div class="upload-text">Click to upload or drag & drop</div>
              <div class="upload-hint">JPEG, PNG, GIF, WEBP — max 10 MB</div>
            </div>
            <div *ngIf="selectedFileName" class="file-selected-info">
              <i class="bi bi-check-circle-fill"></i> {{ selectedFileName }}
            </div>
          </div>

        </div>
      </div>

      <!-- ── RIGHT PANEL: Languages, Tags ── -->
      <div class="form-panel">
        <div class="panel-head">
          <h3 class="panel-title"><i class="bi bi-tag-fill"></i> Languages & Tags</h3>
        </div>
        <div class="panel-body">

          <!-- Languages -->
          <div class="form-field">
            <label class="form-label">Languages <span class="required">*</span></label>
            <div class="checkbox-grid">
              <label *ngFor="let language of languages" class="checkbox-item">
                <input type="checkbox"
                       (change)="toggleLanguage(language.id)"
                       [checked]="isLanguageSelected(language.id)" />
                <span>{{ language.name }}</span>
              </label>
            </div>
          </div>

          <!-- Tags -->
          <div class="form-field">
            <label class="form-label">Tags <span class="required">*</span></label>
            <div class="tag-input-row">
              <input (keyup.enter)="addTag()" [(ngModel)]="tagInput"
                     class="form-input" name="tagInput"
                     placeholder="Type a tag and press Enter or Add" />
              <button (click)="addTag()" class="btn-add-tag" type="button">
                <i class="bi bi-plus-lg"></i> Add
              </button>
            </div>
            <div class="tags-wrap">
              <span *ngFor="let tag of projectForm.tags; let i = index" class="tag-pill">
                {{ tag }}
                <button (click)="removeTag(i)" class="tag-remove" type="button" title="Remove tag">×</button>
              </span>
            </div>
          </div>

        </div>

        <!-- Footer inside right panel so it's always visible -->
        <div class="form-footer">
          <button (click)="resetForm()" class="btn-reset" type="button">Reset</button>
          <button [disabled]="isLoading" class="btn-submit" type="submit">
            <span *ngIf="isLoading" class="spinner-sm"></span>
            <i *ngIf="!isLoading" class="bi bi-cloud-upload"></i>
            {{ isLoading ? 'Uploading...' : 'Upload Project' }}
          </button>
        </div>
      </div>

    </div>
  </form>

</div>
