<app-seller-head></app-seller-head>
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
          <h3 class="mb-0">Add File to Project</h3>
          <button type="button" class="btn btn-sm btn-light" (click)="goBack()">
            ← Back to Projects
          </button>
        </div>
        <div class="card-body">

          <!-- Success Message -->
          <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show" role="alert">
            {{ successMessage }}
            <button type="button" class="btn-close" (click)="successMessage = ''"></button>
          </div>

          <!-- Error Message -->
          <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ errorMessage }}
            <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
          </div>

          <form (ngSubmit)="submitProjectFile()">

            <!-- File Type -->
            <div class="mb-3">
              <label for="fileType" class="form-label">File Type <span class="text-danger">*</span></label>
              <select
                class="form-select"
                id="fileType"
                [(ngModel)]="projectFileForm.fileType"
                name="fileType"
                required>
                <option *ngFor="let type of fileTypes" [value]="type">
                  {{ type }}
                </option>
              </select>
              <small class="form-text text-muted">
                Select the type of file you're uploading
              </small>
            </div>

            <!-- Description -->
            <div class="mb-3">
              <label for="description" class="form-label">Description (Optional)</label>
              <textarea
                class="form-control"
                id="description"
                [(ngModel)]="projectFileForm.description"
                name="description"
                rows="3"
                maxlength="500"
                placeholder="Add a description for this file"></textarea>
              <small class="form-text text-muted">
                {{ projectFileForm.description?.length || 0 }}/500 characters
              </small>
            </div>

            <!-- Display Order -->
            <div class="mb-3">
              <label for="displayOrder" class="form-label">Display Order (Optional)</label>
              <input
                type="number"
                class="form-control"
                id="displayOrder"
                [(ngModel)]="projectFileForm.displayOrder"
                name="displayOrder"
                min="0"
                placeholder="Enter display order (0 for automatic)">
              <small class="form-text text-muted">
                Leave as 0 to automatically append to the end
              </small>
            </div>

            <!-- File Upload -->
            <div class="mb-3">
              <label for="fileInput" class="form-label">Select File <span class="text-danger">*</span></label>
              <input
                type="file"
                class="form-control"
                id="fileInput"
                (change)="onFileSelected($event)"
                required>
              <small class="form-text text-muted">
                Maximum file size: 10MB
              </small>
              <div *ngIf="selectedFileName" class="mt-2 alert alert-info">
                <strong>Selected file:</strong> {{ selectedFileName }}
              </div>
            </div>

            <!-- Submit Buttons -->
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
              <button
                type="button"
                class="btn btn-secondary"
                (click)="resetForm()"
                [disabled]="isLoading">
                Reset
              </button>
              <button
                type="submit"
                class="btn btn-primary"
                [disabled]="isLoading">
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                {{ isLoading ? 'Uploading...' : 'Add File' }}
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
