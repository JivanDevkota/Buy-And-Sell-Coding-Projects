<div class="container mt-4">
  <div class="row">

    <!-- Create Category (col-md-4) -->
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title mb-3">Create Category</h5>

          <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()">

            <div class="mb-3">
              <label class="form-label">Name</label>
              <input
                type="text"
                class="form-control"
                formControlName="name"
                placeholder="Category name">
              <small class="text-danger"
                     *ngIf="categoryForm.get('name')?.touched && categoryForm.get('name')?.invalid">
                Name is required
              </small>
            </div>

            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea
                class="form-control"
                rows="3"
                formControlName="description"
                placeholder="Description"></textarea>
            </div>

            <button
              type="submit"
              class="btn btn-primary w-100"
              [disabled]="categoryForm.invalid || loading">
              {{ loading ? 'Saving...' : 'Create Category' }}
            </button>

          </form>
        </div>
      </div>
    </div>

    <!-- Category List (col-md-8) -->
    <div class="col-md-8">
      <div class="card shadow-sm border-0">

        <div class="card-header bg-white d-flex justify-content-between align-items-center">
          <h5 class="mb-0 fw-semibold">Category List</h5>
          <span class="text-muted small">
            Page {{ page + 1 }} of {{ totalPages }}
          </span>
        </div>

        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Description</th>
            </tr>
            </thead>

            <tbody>
            <tr *ngFor="let cat of categories || []; let i = index">
            <td>{{ (page * size) + i + 1 }}</td>
              <td class="fw-semibold">{{ cat.name }}</td>
              <td>{{ cat.description }}</td>
            </tr>

            <tr *ngIf="categories?.length === 0">
              <td colspan="3" class="text-center text-muted py-4">
                No categories found
              </td>
            </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="card-footer bg-white d-flex justify-content-between align-items-center">
          <button
            (click)="prevPage()"
            [disabled]="page === 0"
            class="btn btn-outline-primary">
            <i class="bi bi-chevron-left"></i> Previous
          </button>

          <span class="text-muted small">
            Showing page {{ page + 1 }} of {{ totalPages }}
          </span>

          <button
            (click)="nextPage()"
            [disabled]="page + 1 >= totalPages"
            class="btn btn-outline-primary">
            Next <i class="bi bi-chevron-right"></i>
          </button>
        </div>

      </div>
    </div>

  </div>
</div>
