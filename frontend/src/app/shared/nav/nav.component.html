<ng-container *ngIf="!isSellerLoggedIn && !isBuyerLoggedIn">
  <nav class="navbar navbar-expand-lg sticky-top custom-nav">
    <div class="container-fluid px-4">

      <a class="navbar-brand" href="#">
        <span class="brand-icon">&lt;/&gt;</span>
        CodeMarket
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">

        <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-lg-1">
          <li class="nav-item">
            <a class="nav-link active" href="#">
              <i class="bi bi-house-door"></i> Categories
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">
              <i class="bi bi-briefcase"></i> Projects
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">
              <i class="bi bi-question-circle"></i> How It Works
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">
              <i class="bi bi-envelope"></i> Contact
            </a>
          </li>
        </ul>

        <div class="d-flex align-items-center gap-2">
          <a href="#" class="btn btn-outline-light position-relative">
            <i class="bi bi-cart"></i> Cart
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">2</span>
          </a>
          <a routerLink="/auth/signup" routerLinkActive="active" class="btn btn-light">
            <i class="bi bi-person"></i> Sign In
          </a>
        </div>

      </div>
    </div>
  </nav>
</ng-container>


<ng-container *ngIf="isSellerLoggedIn">
  <div class="container"></div>
</ng-container>

<ng-container *ngIf="isSuperAdminLoggedIn">
  <div class="container"></div>
</ng-container>


<ng-container *ngIf="isBuyerLoggedIn">
  <nav class="navbar navbar-expand-lg sticky-top custom-nav">
    <div class="container-fluid px-4">

      <a class="navbar-brand" routerLink="/home">
        <span class="brand-icon">&lt;/&gt;</span>
        CodeMarket
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#buyerNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="buyerNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-lg-1">

          <li class="nav-item">
            <a class="nav-link" routerLink="/home" routerLinkActive="active">
              <i class="bi bi-house-door"></i> Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/home" fragment="categories">
              <i class="bi bi-grid"></i> Browse Projects
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/buyer/overview" routerLinkActive="active">
              <i class="bi bi-speedometer2"></i> My Dashboard
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/buyer/orders" routerLinkActive="active">
              <i class="bi bi-bag"></i> My Purchases
            </a>
          </li>

        </ul>

        <div class="d-flex align-items-center gap-2">

          <div class="dropdown">
            <button
              class="btn btn-light dropdown-toggle d-flex align-items-center gap-2"
              type="button"
              data-bs-toggle="dropdown"
              aria-expanded="false">
              <div class="avatar-circle">{{ username?.charAt(0)?.toUpperCase() }}</div>
              {{ username }}
            </button>

            <ul class="dropdown-menu dropdown-menu-end">
              <li class="px-3 py-2 border-bottom">
                <div class="fw-bold text-dark small">{{ username }}</div>
                <div class="text-muted" style="font-size:0.75rem">Premium Buyer</div>
              </li>
              <li>
                <a class="dropdown-item" routerLink="/buyer/overview">
                  <i class="bi bi-speedometer2 me-2 text-primary"></i>Dashboard
                </a>
              </li>
              <li>
                <a class="dropdown-item" routerLink="/buyer/purchases">
                  <i class="bi bi-bag-check me-2 text-primary"></i>My Purchases
                </a>
              </li>
              <li>
                <a class="dropdown-item" routerLink="/buyer/wishlist">
                  <i class="bi bi-heart me-2 text-primary"></i>Wishlist
                </a>
              </li>
              <li>
                <a class="dropdown-item" routerLink="/buyer/profile">
                  <i class="bi bi-person me-2 text-primary"></i>Profile
                </a>
              </li>
              <li><hr class="dropdown-divider"></li>
              <li>
                <button class="dropdown-item text-danger" (click)="logout()">
                  <i class="bi bi-box-arrow-right me-2"></i>Sign Out
                </button>
              </li>
            </ul>
          </div>

        </div>
      </div>
    </div>
  </nav>
</ng-container>
