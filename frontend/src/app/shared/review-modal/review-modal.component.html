<div class="modal-overlay" *ngIf="isVisible" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3 class="modal-title">Review: {{ projectTitle }}</h3>
      <button class="btn-close" (click)="closeModal()">
        <i class="bi bi-x"></i>
      </button>
    </div>
    <div class="modal-body">
      <div class="review-section">
        <label class="review-label">Rate this project</label>
        <div class="star-rating">
          <button
            *ngFor="let star of [1,2,3,4,5]"
            class="star-btn"
            [class.filled]="isStarFilled(star)"
            (click)="setRating(star)"
            (mouseenter)="onStarHover(star)"
            (mouseleave)="onStarLeave()"
            type="button">
            <i class="bi bi-star-fill"></i>
          </button>
        </div>
        <p class="rating-text" *ngIf="rating > 0">{{ rating }} out of 5 stars</p>
      </div>
      <div class="review-section">
        <label class="review-label">Your comment (minimum 10 characters)</label>
        <textarea
          class="review-textarea"
          [(ngModel)]="comment"
          placeholder="Share your experience with this project..."
          rows="5"
          maxlength="500"></textarea>
        <div class="char-count">{{ comment.length }}/500</div>
      </div>
      <div class="alert alert-danger" *ngIf="errorMessage">
        <i class="bi bi-exclamation-circle"></i> {{ errorMessage }}
      </div>
      <div class="alert alert-success" *ngIf="successMessage">
        <i class="bi bi-check-circle"></i> {{ successMessage }}
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline-secondary" (click)="closeModal()" [disabled]="isSubmitting">
        Cancel
      </button>
      <button
        class="btn btn-primary"
        (click)="submitReview()"
        [disabled]="isSubmitting || rating === 0 || !comment.trim()">
        <i class="bi bi-check-lg"></i>
        {{ isSubmitting ? 'Submitting...' : 'Submit Review' }}
      </button>
    </div>
  </div>
</div>
